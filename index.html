<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call UI</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* 全体中央配置 */
.container {
  text-align: center;
}

/* 数字表示 */
.number {
  font-size: 64px;
  font-weight: 300;
  letter-spacing: 6px;
}

/* 小さな補助テキスト */
.label {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.5;
}

/* ボタン */
.btn {
  margin-top: 40px;
  padding: 14px 28px;
  border-radius: 999px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.call {
  background: #1a73e8;
  color: white;
}

.clear {
  background: rgba(255,255,255,0.1);
  color: white;
  margin-right: 10px;
}

/* キーパッド */
.keypad {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
}

.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
  user-select: none;
}

.key:active {
  transform: scale(0.92);
}
</style>
</head>

<body>

<div class="container">

  <div id="display" class="number">0</div>

  <div class="label">番号入力</div>

  <div class="keypad">
    <div class="key" onclick="add('1')">1</div>
    <div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div>
    <div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div>
    <div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div>
    <div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="back()">⌫</div>
    <div class="key" onclick="add('0')">0</div>
    <div class="key" onclick="clearAll()">C</div>
  </div>

  <div>
    <button class="btn clear" onclick="clearAll()">クリア</button>
    <button class="btn call" onclick="call()">CALL</button>
  </div>

</div>

<script>
let number = "0";

function render() {
  document.getElementById("display").innerText = number;
}

function add(d) {
  if (number === "0") number = "";
  number += d;
  render();
}

function back() {
  number = number.slice(0, -1);
  if (number === "") number = "0";
  render();
}

function clearAll() {
  number = "0";
  render();
}

async function call() {
  const number = document.getElementById("display").innerText;

  try {
    const res = await fetch("/api/call", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ to: number })
    });

    const data = await res.json();

    if (!res.ok) {
      alert("エラー: " + data.error);
      return;
    }

    alert("発信開始: " + data.sid);

  } catch (err) {
    alert("通信エラー: " + err.message);
  }
}
</script>

</body>
</html>
